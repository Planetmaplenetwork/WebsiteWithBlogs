<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITLE}} | PlanetMaple Blog</title>
    <link rel="shortcut icon" href="../favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="../global.css">
    <link rel="stylesheet" href="../src/css/blog.css">
    <script src="../global.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script>hljs.highlightAll();</script>
</head>

<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-brand">
                <div class="nav-logo">
                    <img src="../src/images/logo.svg" alt="PlanetMaple Logo">
                </div>
                <span>PlanetMaple</span>
            </div>

            <ul class="nav-menu">
                <li class="nav-item">
                    <a href="/" class="nav-link">Home</a>
                </li>
                <li class="nav-item">
                    <a href="/servers" class="nav-link">Servers</a>
                </li>
                <li class="nav-item">
                    <a href="/community" class="nav-link">Community</a>
                </li>
                <li class="nav-item">
                    <a href="/store" class="nav-link">Store</a>
                </li>
                <li class="nav-item">
                    <a href="/wiki" class="nav-link">Wiki</a>
                </li>
                <li class="nav-item">
                    <a href="/blog" class="nav-link active">Blog</a>
                </li>
            </ul>

            <div class="nav-actions">
                <a href="https://dsc.planetmaple.org" class="discord-btn">
                    <i class="bi bi-discord"></i> Discord
                </a>
                <button class="nav-toggle">
                    <i class="bi bi-list"></i>
                </button>
            </div>
        </div>
    </nav>

    <main class="blog-container">
        <article class="post-content">
            <a href="../index.html" class="back-link">← Back to Blog</a>
            <h1>{{TITLE}}</h1>
            <time datetime="{{DATE}}">{{DATE}}</time>
            <div class="content">
                {{CONTENT}}
            </div>
        </article>
    </main>

    <footer class="blog-footer">
        <p>© PlanetMaple – Powered by GitHub Issues</p>
    </footer>

    <!-- Copy button script (unchanged) -->
    <script>
        (function () {
            const pres = document.querySelectorAll('pre');
            pres.forEach(pre => {
                const btn = document.createElement('button');
                btn.textContent = 'Copy';
                btn.classList.add('copy-btn');

                btn.addEventListener('click', async () => {
                    const code = pre.querySelector('code');
                    const text = code ? code.innerText : pre.innerText;
                    try {
                        await navigator.clipboard.writeText(text);
                        btn.textContent = 'Copied!';
                        setTimeout(() => { btn.textContent = 'Copy'; }, 2000);
                    } catch (err) {
                        console.error('Failed to copy: ', err);
                    }
                });

                pre.appendChild(btn);
            });
        })();
    </script>
</body>

</html>
