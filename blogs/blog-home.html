<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog | PlanetMaple</title>
    <link rel="shortcut icon" href="../favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="../global.css">
    <link rel="stylesheet" href="../src/css/blog.css">
    <script src="../global.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-brand">
                <div class="nav-logo">
                    <img src="../src/images/logo.svg" alt="PlanetMaple Logo">
                </div>
                <span>PlanetMaple</span>
            </div>
            <ul class="nav-menu">
                <li class="nav-item"><a href="../index.html" class="nav-link">Home</a></li>
                <li class="nav-item"><a href="../servers" class="nav-link">Servers</a></li>
                <li class="nav-item"><a href="../community" class="nav-link">Community</a></li>
                <li class="nav-item"><a href="../store" class="nav-link">Store</a></li>
                <li class="nav-item"><a href="../wiki" class="nav-link">Wiki</a></li>
                <li class="nav-item"><a href="../blogs/" class="nav-link active">Blog</a></li>
            </ul>
            <div class="nav-actions">
                <a href="https://dsc.planetmaple.org" class="discord-btn"><i class="bi bi-discord"></i> Discord</a>
                <button class="nav-toggle"><i class="bi bi-list"></i></button>
            </div>
        </div>
    </nav>

    <main class="blog-container">
        <header class="blog-header">
            <h1>PlanetMaple Blog</h1>
            <p>Updates, guides, and stories from the server</p>
        </header>
        <section class="all-posts">
            {{ALL_POSTS}}
        </section>
    </main>

    <footer class="blog-footer">
        <p>© PlanetMaple – Powered by GitHub Issues</p>
    </footer>
</body>
</html>
